<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitPro Express Tracking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-shell">
        <h1>TransitPro Express Tracking</h1>
        
        <div class="field-row">
            <label for="trackingInput">Tracking number</label>
            <input type="text" id="trackingInput" placeholder="Enter ID (e.g. TRK101)">
            <button onclick="trackPackage()">Track</button>
        </div>

        <div id="statusResult" class="status-card">
            <p><strong>Customer:</strong> <span id="display_name">---</span></p>
            <p><strong>Address:</strong> <span id="display_address">---</span></p>
            <p><strong>Status:</strong> <span id="display_status">---</span></p>
        </div>

        <footer id="support" class="footer">
            <p>TransitPro © 2026 · U.S. shipment tracking made simple</p>
        </footer>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAzoPPlCU-BC5gqU5WFRjlGgrz7UqvPVLc",
        authDomain: "packagetrackingcourierform.firebaseapp.com",
        databaseURL: "https://packagetrackingcourierform-default-rtdb.firebaseio.com",
        projectId: "packagetrackingcourierform",
        storageBucket: "packagetrackingcourierform.firebasestorage.app",
        messagingSenderId: "324365481493",
        appId: "1:324365481493:web:4f2f81967bd9637953801c"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      window.trackPackage = function() {
        const trackingId = document.getElementById('trackingInput').value;
        const dbRef = ref(db);

        get(child(dbRef, trackingId)).then((snapshot) => {
          if (snapshot.exists()) {
            const data = snapshot.val();
            document.getElementById('display_name').innerText = data.customer_name || 'N/A';
            document.getElementById('display_address').innerText = data.delivery_address || 'N/A';
            document.getElementById('display_status').innerText = data.status || 'N/A';
          } else {
            alert("Invalid Tracking ID. Please check and try again.");
          }
        }).catch((error) => {
          console.error("Error fetching data:", error);
        });
      }
    </script>
</body>
</html>
