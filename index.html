<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitPro Express Tracking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">TransitPro Express</p>
                <h1>Track your shipment</h1>
                <p>Enter a tracking number to see the latest status from our API.</p>
            </div>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </header>

        <form id="trackingForm" class="tracking-form">
            <label for="trackingInput">Tracking number</label>
            <input type="text" id="trackingInput" placeholder="Enter ID (e.g. PG74833857558585)" autocomplete="off">
            <button type="submit" id="trackButton" class="button primary">Track package</button>
        </form>

        <div id="statusResult" class="status-card"></div>

        <section class="recent-section">
            <h2>Recent searches</h2>
            <div id="recentList" class="recent-list"></div>
        </section>

        <section class="contact-section">
            <h2>Contact support</h2>
            <form id="contactForm" class="contact-form">
                <input type="text" id="contactName" placeholder="Your name">
                <input type="email" id="contactEmail" placeholder="Your email">
                <textarea id="contactMessage" placeholder="How can we help?"></textarea>
                <button type="submit" class="button secondary">Send message</button>
            </form>
            <div id="contactResult" class="status-card" style="display: none;"></div>
        </section>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
