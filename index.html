<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitPro Express Tracking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="page-shell">
        <h1>TransitPro Express Tracking</h1>

        <div class="field-row">
            <label for="trackingInput">Tracking number</label>
            <input type="text" id="trackingInput" placeholder="Enter ID (e.g. TRK101)">
            <button onclick="trackPackage()">Track</button>
        </div>

        <div id="statusResult" class="status-card" style="display: none;">
            <p><strong>Customer:</strong> <span id="display_name">---</span></p>
            <p><strong>Address:</strong> <span id="display_address">---</span></p>
            <p><strong>Status:</strong> <span id="display_status">---</span></p>
            <p><strong>Delivery estimate:</strong> <span id="display_eta">---</span></p>
            <p><strong>Last update:</strong> <span id="display_last_update">---</span></p>
            <div id="routeHistory" style="margin-top: 16px;"></div>
            <iframe id="map-frame" width="100%" height="250" style="border:0; margin-top:15px; border-radius:12px; display:none;" src="" allowfullscreen></iframe>
            <button onclick="resetSearch()" style="margin-top: 20px; background-color: #666; color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer; width: 100%;">Track Another Package</button>
        </div>

        <section id="editSection" class="support-container" style="display: none; margin-top: 32px;">
            <h3>Edit shipment details</h3>
            <form id="shipmentEditForm" class="contact-form">
                <div class="form-group">
                    <label for="editCustomerName">Customer name</label>
                    <input id="editCustomerName" type="text" placeholder="Enter customer name" />
                </div>
                <div class="form-group">
                    <label for="editCustomerAddress">Customer address</label>
                    <input id="editCustomerAddress" type="text" placeholder="Enter customer address" />
                </div>
                <div class="form-group">
                    <label for="editStatus">Status</label>
                    <input id="editStatus" type="text" placeholder="Enter shipment status" />
                </div>
                <div class="form-group">
                    <label for="editEta">Estimated delivery</label>
                    <input id="editEta" type="text" placeholder="Enter estimated delivery" />
                </div>
                <div class="form-group">
                    <label for="editLastUpdate">Last update</label>
                    <input id="editLastUpdate" type="text" placeholder="Enter last update message" />
                </div>
                <div class="form-group">
                    <label for="editRoute">Route history</label>
                    <textarea id="editRoute" rows="4" placeholder="One event per line"></textarea>
                </div>
                <button type="button" onclick="saveShipmentDetails()" class="button primary">Save shipment details</button>
                <p id="saveStatus" class="status-empty" style="display: none; margin-top: 12px;"></p>
            </form>
        </section>

        <section class="support-container" style="margin-top: 32px;">
            <h3>Contact Support</h3>
            <div id="contactForm">
                <input type="text" id="supportName" placeholder="Your Name" style="width: 100%; margin-bottom: 10px; padding: 8px;">
                <input type="email" id="supportEmail" placeholder="Your Email" style="width: 100%; margin-bottom: 10px; padding: 8px;">
                <textarea id="supportMessage" placeholder="How can we help?" style="width: 100%; height: 80px; margin-bottom: 10px; padding: 8px;"></textarea>
                <button onclick="sendEnquiry()" style="background-color: #28a745; color: white; width: 100%; padding: 10px; border: none; cursor: pointer;">Send Enquiry</button>
            </div>
            <div id="supportSuccess" style="display: none; color: green; font-weight: bold; margin-top: 10px;">Message sent successfully!</div>
        </section>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, get, child, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAzoPPlCU-BC5gqU5WFRjlGgrz7UqvPVLc",
    authDomain: "packagetrackingcourierform.firebaseapp.com",
    databaseURL: "https://packagetrackingcourierform-default-rtdb.firebaseio.com",
    projectId: "packagetrackingcourierform",
    storageBucket: "packagetrackingcourierform.firebasestorage.app",
    messagingSenderId: "324365481493",
    appId: "1:324365481493:web:4f2f81967bd9637953801c",
    measurementId: "G-C4K2EBJCJZ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let currentTrackingId = null;

  function showElement(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'block';
  }

  function hideElement(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  }

  function populateEditForm(data) {
    currentTrackingId = document.getElementById('trackingInput').value.trim().toUpperCase();
    document.getElementById('editCustomerName').value = data.customer_name || '';
    document.getElementById('editCustomerAddress').value = data.customer_address || '';
    document.getElementById('editStatus').value = data.status || '';
    document.getElementById('editEta').value = data.eta || '';
    document.getElementById('editLastUpdate').value = data.lastUpdate || '';
    document.getElementById('editRoute').value = (data.route || []).join('\n');
    showElement('editSection');
  }

  window.trackPackage = function() {
    const trackingId = document.getElementById('trackingInput').value.trim().toUpperCase();
    if (!trackingId) { alert('Please enter a tracking number.'); return; }

    get(child(ref(db), trackingId)).then((snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        currentTrackingId = trackingId;
        document.getElementById('display_name').innerText = data.customer_name || 'N/A';
        document.getElementById('display_address').innerText = data.customer_address || 'N/A';
        document.getElementById('display_status').innerText = data.status || 'N/A';
        document.getElementById('display_eta').innerText = data.eta || 'N/A';
        document.getElementById('display_last_update').innerText = data.lastUpdate || 'N/A';

        const route = data.route || [];
        document.getElementById('routeHistory').innerHTML = `<p><strong>Route history:</strong></p><ul>${route.map(item => `<li>${item}</li>`).join('')}</ul>`;

        const addr = data.customer_address;
        const mapFrame = document.getElementById('map-frame');
        if (mapFrame && addr && addr !== 'N/A') {
          mapFrame.src = 'https://www.google.com/maps?q=' + encodeURIComponent(addr) + '&output=embed';
          mapFrame.style.display = 'block';
        } else {
          mapFrame.style.display = 'none';
        }

        showElement('statusResult');
        showElement('editSection');
        populateEditForm(data);
      } else {
        alert('Tracking ID not found.');
      }
    }).catch(err => {
      alert('Error: ' + err.message);
    });
  };

  window.saveShipmentDetails = function() {
    if (!currentTrackingId) {
      alert('No package selected to update.');
      return;
    }

    const payload = {
      customer_name: document.getElementById('editCustomerName').value.trim(),
      customer_address: document.getElementById('editCustomerAddress').value.trim(),
      status: document.getElementById('editStatus').value.trim(),
      eta: document.getElementById('editEta').value.trim(),
      lastUpdate: document.getElementById('editLastUpdate').value.trim(),
      route: document.getElementById('editRoute').value
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
    };

    const saveStatusEl = document.getElementById('saveStatus');
    saveStatusEl.style.display = 'none';
    saveStatusEl.textContent = '';

    update(ref(db, currentTrackingId), payload)
      .then(() => {
        saveStatusEl.textContent = 'Shipment details saved to Firebase.';
        saveStatusEl.style.color = '#059669';
        saveStatusEl.style.display = 'block';
        window.trackPackage();
      })
      .catch(err => {
        saveStatusEl.textContent = 'Save failed: ' + err.message;
        saveStatusEl.style.color = '#c92a2a';
        saveStatusEl.style.display = 'block';
      });
  };

  window.resetSearch = function() {
    document.querySelector('.field-row').style.display = 'flex';
    hideElement('statusResult');
    hideElement('editSection');
    document.getElementById('trackingInput').value = '';
    currentTrackingId = null;
  };

  window.sendEnquiry = function() {
    const name = document.getElementById('supportName').value;
    const email = document.getElementById('supportEmail').value;
    const message = document.getElementById('supportMessage').value;
    if (!name || !email || !message) { alert('Please fill in all fields.'); return; }
    set(ref(db, 'enquiries/' + Date.now()), {
      customer_name: name,
      customer_email: email,
      message: message,
      timestamp: new Date().toLocaleString()
    }).then(() => {
      document.getElementById('contactForm').style.display = 'none';
      document.getElementById('supportSuccess').style.display = 'block';
    }).catch(err => {
      alert('Support request failed: ' + err.message);
    });
  };
</script>
</body>
</html>
