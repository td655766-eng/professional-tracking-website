<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitPro Express Tracking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="page-shell">
        <h1>TransitPro Express Tracking</h1>
        
        <div class="field-row">
            <label for="trackingInput">Tracking number</label>
            <input type="text" id="trackingInput" placeholder="Enter ID (e.g. TRK101)">
            <button onclick="trackPackage()">Track</button>
        </div>

        <div id="statusResult" class="status-card" style="display: none;">
    <p><strong>Customer:</strong> <span id="display_name">---</span></p>
    <p><strong>Address:</strong> <span id="display_address">---</span></p>
    <p><strong>Status:</strong> <span id="display_status">---</span></p>
    
   <iframe id="map-frame" width="100%" height="250" style="border:0; margin-top:15px; border-radius:12px;" src="" allowfullscreen></iframe>
    <button onclick="resetSearch()" style="margin-top: 20px; background-color: #666; color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer; width: 100%;">Track Another Package</button>
</div>

        <footer id="support" class="footer">
            <p>TransitPro © 2026 · U.S. shipment tracking made simple</p>
        </footer>
    </div><div id="extra-features" class="support-container">
        <button class="support-btn" onclick="window.location.href='mailto:support@transitpro.com'">
            Contact Support
        </button>
        <div class="info-links">
            <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a>
        </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAzoPPlCU-BC5gqU5WFRjlGgrz7UqvPVLc",
        authDomain: "packagetrackingcourierform.firebaseapp.com",
        databaseURL: "https://packagetrackingcourierform-default-rtdb.firebaseio.com",
        projectId: "packagetrackingcourierform",
        storageBucket: "packagetrackingcourierform.firebasestorage.app",
        messagingSenderId: "324365481493",
        appId: "1:324365481493:web:4f2f81967bd9637953801c"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      window.trackPackage = function() {
        const trackingId = document.getElementById('trackingInput').value;
        const dbRef = ref(db);

        get(child(dbRef, trackingId)).then((snapshot) => {
       if (snapshot.exists()) {
        const data = snapshot.val();
        
        // 1. Fill in the text fields
        document.getElementById('display_name').innerText = data.customer_name || 'N/A';
        document.getElementById('display_address').innerText = data.delivery_address || 'N/A';
        document.getElementById('display_status').innerText = data.status || 'N/A';

        // 2. The "Next Page" effect: Hide search, show results
        document.querySelector('.field-row').style.display = 'none'; 
        document.getElementById('statusResult').style.display = 'block';

        // 3. Update the Map URL
        const encodedAddress = encodeURIComponent(data.delivery_address);
        const mapUrl = `https://maps.google.com/maps?q=${encodedAddress}&t=&z=13&ie=UTF8&iwloc=&output=embed`;
        
        const mapFrame = document.getElementById('map-frame');
        if (mapFrame) {
            mapFrame.src = mapUrl;
        }
} else {
        alert("Invalid Tracking ID. Please check and try again.");
      }
    }).catch((error) => {
      console.error("Error fetching data:", error);
    });
}; 

// This handles the "Track Another" button
window.resetSearch = function() {
    // 1. Show the search input again
    document.querySelector('.field-row').style.display = 'block';
    
    // 2. Hide the results, map, and support button
    document.getElementById('statusResult').style.display = 'none';
    
    const extra = document.getElementById('extra-features');
    if (extra) extra.style.display = 'none';
    
    // 3. Clear the input field for the next search
    document.getElementById('trackingInput').value = '';
};
    </script>
</body>
</html>
