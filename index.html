<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">TransitPro Express</p>
                <h1>Track your package</h1>
                <p>Enter your tracking number below</p>
            </div>
        </header>

        <!-- Search Form -->
        <form id="searchForm" class="tracking-form">
            <label for="trackingInput">Tracking number</label>
            <input type="text" id="trackingInput" placeholder="Enter tracking number" autocomplete="off">
            <button type="submit" class="button primary">Search</button>
        </form>

        <div id="message" class="status-card"></div>

        <!-- Shipment Details (hidden until search) -->
        <div id="shipmentDetails" style="display: none;">
            <div class="summary-card">
                <h2 id="trackingNumber"></h2>
                <p><strong>Customer:</strong> <span id="customerName"></span></p>
                <p><strong>Address:</strong> <span id="customerAddress"></span></p>
                <p><strong>Status:</strong> <span id="status" style="color: #0066ff; font-weight: bold;"></span></p>
                <p><strong>Location:</strong> <span id="location"></span></p>
                <p><strong>Estimated Delivery:</strong> <span id="eta"></span></p>
                <p><strong>Last Update:</strong> <span id="lastUpdate"></span></p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
