<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitPro Express Tracking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">TransitPro Express</p>
                <h1>Track your shipment</h1>
                <p>Enter a tracking number to see the latest status.</p>
            </div>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </header>

        <form id="trackingForm" class="tracking-form">
            <label for="trackingInput">Tracking number</label>
            <input type="text" id="trackingInput" placeholder="Enter ID (e.g. PG74833857558585)" autocomplete="off">
            <button type="submit" id="trackButton" class="button primary">Track package</button>
        </form>

        <section class="create-section">
            <h2>Create shipment (for customers)</h2>
            <form id="createForm" class="contact-form">
                <div class="form-group">
                    <label for="createCustomerName">Customer name</label>
                    <input id="createCustomerName" type="text" placeholder="Jane Doe" />
                </div>
                <div class="form-group">
                    <label for="createCustomerAddress">Customer address</label>
                    <input id="createCustomerAddress" type="text" placeholder="123 Main St, City, ST" />
                </div>
                <div class="form-group">
                    <label for="createStatus">Status</label>
                    <input id="createStatus" type="text" placeholder="Processing" />
                </div>
                <div class="form-group">
                    <label for="createEta">Estimated delivery</label>
                    <input id="createEta" type="text" placeholder="3 business days" />
                </div>
                <div class="form-group">
                    <label for="createLastUpdate">Last update</label>
                    <input id="createLastUpdate" type="text" placeholder="Label created" />
                </div>
                <div class="form-group">
                    <label for="createRoute">Route history (one per line)</label>
                    <textarea id="createRoute" rows="3" placeholder="Shipment received\nIn transit to hub"></textarea>
                </div>
                <div class="form-group">
                    <label for="createClientId">Client ID (optional)</label>
                    <input id="createClientId" type="text" placeholder="Your company id" />
                </div>
                <button type="submit" class="button primary">Create shipment</button>
                <p id="createResult" class="status-empty" style="display:none; margin-top:12px;"></p>
            </form>
        </section>

        <div id="statusResult" class="status-card"></div>

        <section class="contact-section">
            <h2>Contact support</h2>
            <form id="contactForm" class="contact-form">
                <input type="text" id="contactName" placeholder="Your name">
                <input type="email" id="contactEmail" placeholder="Your email">
                <textarea id="contactMessage" placeholder="How can we help?"></textarea>
                <button type="submit" class="button secondary">Send message</button>
            </form>
            <div id="contactResult" class="status-card" style="display: none;"></div>
        </section>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
