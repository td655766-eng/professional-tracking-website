<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitPro Shipment Details</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="page-shell">
    <nav class="site-nav">
      <a class="brand" href="index.html">TransitPro</a>
      <div class="nav-links">
        <a href="index.html">Track another</a>
        <a href="#support">Support</a>
      </div>
    </nav>

    <section class="results-hero">
      <div class="results-header">
        <span class="eyebrow">Shipment overview</span>
        <h1>Delivery status details</h1>
        <p id="resultDescription">Loading tracking result...</p>
      </div>

      <div id="resultContent" class="result-grid">
      </div>

      <div class="action-row">
        <label style="display: flex; align-items: center; gap: 8px; font-weight: 600;">
          <input type="checkbox" id="emailAlerts" /> Email updates for this shipment
        </label>
        <a href="index.html" class="button secondary">Return to tracker</a>
      </div>

      <section id="editSection" class="status-card" style="display: none;">
        <h2>Edit shipment details</h2>
        <p class="hint">Update status, location, delivery estimate, and route history.</p>
        <form id="editForm" class="contact-form">
          <div class="form-group">
            <label for="editStatus">Status</label>
            <input id="editStatus" type="text" placeholder="Enter shipment status" />
          </div>
          <div class="form-group">
            <label for="editLocation">Location</label>
            <input id="editLocation" type="text" placeholder="Enter current location" />
          </div>
          <div class="form-group">
            <label for="editEta">Estimated delivery</label>
            <input id="editEta" type="text" placeholder="Enter estimated delivery" />
          </div>
          <div class="form-group">
            <label for="editLastUpdate">Last update</label>
            <input id="editLastUpdate" type="text" placeholder="Enter last update message" />
          </div>
          <div class="form-group">
            <label for="editRoute">Route history</label>
            <textarea id="editRoute" rows="4" placeholder="One event per line"></textarea>
          </div>
          <button type="submit" class="button primary">Save changes</button>
          <p id="updateResult" class="status-empty" style="display: none; margin-top: 12px;"></p>
        </form>
      </section>
    </section>
  </div>

  <footer id="support" class="footer">
    <p>TransitPro © 2026 · U.S. shipment tracking made simple</p>
  </footer>

  <script src="config.js"></script>
  <script src="results.js"></script>
</body>
</html>
